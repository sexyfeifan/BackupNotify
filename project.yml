name: BackupNotify
options:
  bundleIdPrefix: com.backupnotify
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.backupnotify.app
    INFOPLIST_FILE: BackupNotify/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
    COMBINE_HIDPI_IMAGES: YES
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/../Frameworks"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    SWIFT_EMIT_LOC_STRINGS: YES
    INFOPLIST_KEY_LSUIElement: YES

targets:
  BackupNotify:
    type: application
    platform: macOS
    sources:
      - path: BackupNotify
        excludes:
          - ".gitkeep"
    resources:
      - path: BackupNotify/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: BackupNotify/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.backupnotify.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: BackupNotify/Resources/Info.plist
